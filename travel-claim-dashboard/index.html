<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roam — IBM Travel & Expense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">

      <!-- ── Sidebar ── -->
      <aside class="sidebar">
        <a class="brand" href="#"><span class="brand-mark">r</span><span>roam</span></a>
        <nav class="nav" aria-label="Primary">
          <button class="nav-item active" data-page="dashboard">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            Dashboard
          </button>
          <button class="nav-item" data-page="new-claim">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            New claim
          </button>
          <button class="nav-item" data-page="my-claims">
            <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3Z"/><path d="M9 8h6M9 12h4"/></svg>
            My claims
          </button>
          <button class="nav-item" data-page="book-flight">
            <svg viewBox="0 0 24 24"><path d="m22 16-8.5-4.5V5.2a1.5 1.5 0 0 0-3 0v6.3L2 16v2l8.5-2v3.5l-2 1.5v1h7v-1l-2-1.5V16l8.5 2v-2Z"/></svg>
            Book flight
          </button>
          <button class="nav-item" data-page="book-hotel">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="1"/><path d="M9 21V12h6v9M2 9h20"/></svg>
            Book hotel
          </button>
        </nav>
        <div class="sidebar-foot">
          <div class="user-row">
            <div class="avatar">PS</div>
            <div><strong>Priya Sharma</strong><small>EMP001</small></div>
          </div>
        </div>
      </aside>

      <!-- ── Main ── -->
      <main class="main">
        <header class="topbar">
          <span class="breadcrumb" id="breadcrumb">Overview</span>
          <div class="topbar-right">
            <input class="search" id="searchInput" placeholder="Search claims…" />
            <button class="topbar-btn" id="refreshBtn" title="Refresh data">
              <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14.9-4M20 12a8 8 0 0 1-14.9 4"/><path d="M18 4v4h-4M6 20v-4H2"/></svg>
            </button>
          </div>
        </header>

        <!-- Page content injected here -->
        <div class="content" id="content"></div>
      </main>
    </div>

    <!-- Detail drawer (slide-in panel for claim/booking details) -->
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-inner" id="drawerInner"></div>
    </aside>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span class="toast-icon" id="toastIcon">✓</span>
      <div><b id="toastTitle"></b><p id="toastMsg"></p></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
