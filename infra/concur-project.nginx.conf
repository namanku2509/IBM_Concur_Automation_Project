server {
    listen 80;
    server_name 169.60.30.246 _;

    # React SPA build — static files
    root /home/itzuser/concur-from-github/expense-copilot/frontend/build;
    index index.html;

    # API proxy → BFF Express.js on port 4000
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Long timeouts for Docling OCR (can take up to 10 min for large batches)
        proxy_connect_timeout  30s;
        proxy_send_timeout     660s;
        proxy_read_timeout     660s;
        send_timeout           660s;

        # Allow large uploads (PDF receipts)
        client_max_body_size   50M;
    }

    # Interactive travel workspace served by the BFF
    location /travel {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all non-API routes served by React
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
